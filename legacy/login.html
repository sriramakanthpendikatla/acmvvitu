<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ACM VVITU admin login — chapter officers only." />
  <title>Login — ACM VVITU</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="login">

<nav class="site-nav">
  <a href="index.html" class="nav-logo"><span class="nav-logo-mark">A</span> ACM VVITU</a>
  <ul class="nav-links">
    <li><a href="index.html" data-nav="home">Home</a></li>
    <li><a href="about.html" data-nav="about">About</a></li>
    <li><a href="members.html" data-nav="members">Members</a></li>
    <li><a href="events.html" data-nav="events">Events</a></li>
    <li><a href="calendar.html" data-nav="calendar">Calendar</a></li>
    <li><a href="contact.html" data-nav="contact">Contact</a></li>
  </ul>
  <div class="nav-actions">
    <a href="login.html" class="btn btn-outline">Login</a>
    <button class="nav-toggle" aria-label="Menu">☰</button>
  </div>
</nav>

<div class="login-page">
  <div class="login-card reveal">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div class="nav-logo-mark" style="width:48px;height:48px;font-size:1.25rem;margin:0 auto 1rem;border-radius:12px;display:grid;place-items:center">A</div>
    </div>
    <h1>Officer login</h1>
    <p class="subtitle">Chapter officers and admins only</p>
    <form data-form="login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" required placeholder="officer@vvit.net" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" required placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem">Sign in</button>
    </form>
    <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:var(--muted)">
      Admin panel (Next.js + Supabase + NextAuth) is planned per the system design doc.<br />
      <a href="index.html" class="text-link" style="margin-top:0.5rem;display:inline-block">← Back to site</a>
    </p>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
